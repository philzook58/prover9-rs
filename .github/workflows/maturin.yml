name: Maturin

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Prover9 submodule
        run: |
          rm -rf Prover9
          git submodule sync --recursive
          git submodule update --init --force --depth=1 --recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build manylinux wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --manifest-path pyprover9/Cargo.toml --release --out pyprover9/dist --find-interpreter
          manylinux: auto
          sccache: "true"
      - name: Test installed wheel
        working-directory: pyprover9
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install "prover9[test]" --find-links dist --force-reinstall
          pytest
      - name: Upload linux wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: pyprover9/dist

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Prover9 submodule
        shell: bash
        run: |
          rm -rf Prover9
          git submodule sync --recursive
          git submodule update --init --force --depth=1 --recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          architecture: x64
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --manifest-path pyprover9/Cargo.toml --release --out pyprover9/dist --find-interpreter
          sccache: "true"
      - name: Test installed wheel
        shell: bash
        working-directory: pyprover9
        run: |
          python -m venv .venv
          . .venv/Scripts/activate
          pip install --upgrade pip
          pip install "prover9[test]" --find-links dist --force-reinstall
          pytest
      - name: Upload windows wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: pyprover9/dist

  macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-12
            target: x86_64
          - runner: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Prover9 submodule
        run: |
          rm -rf Prover9
          git submodule sync --recursive
          git submodule update --init --force --depth=1 --recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --manifest-path pyprover9/Cargo.toml --release --out pyprover9/dist --find-interpreter
          sccache: "true"
      - name: Test installed wheel
        working-directory: pyprover9
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install "prover9[test]" --find-links dist --force-reinstall
          pytest
      - name: Upload macOS wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: pyprover9/dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Prover9 submodule
        run: |
          rm -rf Prover9
          git submodule sync --recursive
          git submodule update --init --force --depth=1 --recursive
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path pyprover9/Cargo.toml --out pyprover9/dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: pyprover9/dist
